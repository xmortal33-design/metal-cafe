<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Metal Cafe</title>
<link rel="stylesheet" href="checkout.css">
</head>

<body>

<div class="checkout-container">

<h1>Checkout</h1>

<div class="form-group">
<label>Full Name</label>
<input type="text" id="customerName" placeholder="Enter your full name">
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel" id="customerPhone" placeholder="03XXXXXXXXX">
</div>

<div class="form-group">
<label>Delivery Address</label>
<textarea id="customerAddress" placeholder="Enter your complete address"></textarea>
</div>

<div class="coupon-box">

<h3>Discount Coupon</h3>

<input
type="text"
id="couponCode"
placeholder="Enter Coupon Code">

<button id="applyCoupon">
Apply Coupon
</button>

<p id="couponMessage"></p>

</div>

<div id="orderSummary">

<h3>Order Summary</h3>

<div id="checkoutItems"></div>

<h4>Total :
<span id="checkoutTotal">
Rs.0
</span>
</h4>

</div>

<button
type="button"
id="continuePaymentBtn">
Continue To Payment
</button>

<div
id="paymentSection"
style="display:none;">

<h3>Select Payment Method</h3>

<select id="paymentMethod">

<option value="">
Choose Payment
</option>

<option value="EasyPaisa">
EasyPaisa
</option>

<option value="JazzCash">
JazzCash
</option>

<option value="Cash on Delivery">
Cash On Delivery
</option>

</select>

<p id="paymentInfo"></p>

<div id="paymentDetails" style="display:none;">

<h3>Payment Details</h3>

<p id="paymentNumber"></p>

<p>
After payment, click the button below to confirm your order.
</p>

<button
type="button"
id="confirmPaymentBtn">

Payment Done / Confirm Order

</button>

</div>

</div>

<script src="checkout.js"></script>

</body>
</html>
